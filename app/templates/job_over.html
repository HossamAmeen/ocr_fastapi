<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Over Generator</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="page">
    <nav class="site-nav">
      <a href="/">Proforma</a>
      <a href="/soe">SOE Time Log</a>
      <a href="/job-over" class="active">Job Over</a>
    </nav>

    <header class="hero">
      <div class="hero-text">
        <p class="eyebrow">OCR + Excel</p>
        <h1>Job Over Generator</h1>
        <p class="subtitle">
          Upload a completion program PDF and a Job Order Excel template (.xlsm).
          Procedure lines are extracted and appended to the JOB ORDER sheet.
        </p>
      </div>
    </header>

    <main class="layout">
      <section class="card upload-card">
        <h2>Upload files</h2>
        <form id="job-over-form">
          <label class="field">
            <span>Completion Program PDF</span>
            <input type="file" id="pdf-file" name="pdf" accept=".pdf" required />
          </label>

          <label class="field">
            <span>Excel Template (.xlsm)</span>
            <input type="file" id="excel-file" name="excel" accept=".xlsm,.xlsx" required />
          </label>

          <label class="field">
            <span>Extraction template</span>
            <select id="source" name="source">
              <option value="auto" selected>Auto-detect</option>
              <option value="1c">1-C procedure (detailed lines)</option>
              <option value="running">Running completion</option>
            </select>
          </label>

          <button type="submit" id="submit-btn">Generate Job Order</button>
        </form>

        <div id="status" class="status hidden"></div>
      </section>

      <section class="card results-card hidden" id="results-card">
        <div class="results-header">
          <h2>Extracted procedure</h2>
          <a id="download-link" class="download-btn" href="#" download>Download Excel</a>
        </div>

        <div class="summary" id="summary"></div>

        <div class="table-wrap">
          <table id="lines-table">
            <thead>
              <tr>
                <th>Step</th>
                <th>Text</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="/static/js/job_over.js"></script>
</body>
</html>
